<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>???</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">VL-EC-MQ</a>
    <nav class="nav">
      <div id="authButtons"></div>
    </nav>
  </div>
</header>

<div class="work-layout">
  <aside class="work-sidebar">
    <h3 class="sidebar-title">Страницы</h3>
    <div id="pagesList"></div>
  </aside>
  <main class="work-content">
    <div id="pageContent" class="page-content">
      <p class="loading-text">Загрузка...</p>
    </div>
  </main>
</div>

<footer class="footer">
  © 2026 Rayma Suzua/Rintarocan (Рэйма Сузуя/Ринтаросан). Все персонажи, миры и произведения являются интеллектуальной собственностью автора.<br>
  Любое копирование или использование без разрешения запрещено.
</footer>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDoRa8vf2rjzgRG4nhf46Ps0rfsy7Vkj14",
    authDomain: "vlecmq.firebaseapp.com",
    projectId: "vlecmq",
    storageBucket: "vlecmq.firebasestorage.app",
    messagingSenderId: "730050177884",
    appId: "1:730050177884:web:d4c7c17614b6aa51c96f99"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN_EMAIL = "nopaknopanopefake@gmail.com";

  let isAdmin = false;
  let currentQuill = null;
  let currentPageId = null;
  let secretDocId = null;

  async function uploadFile(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "sititit");
    const res = await fetch("https://api.cloudinary.com/v1_1/dnhnxdkmh/image/upload", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    return data.secure_url;
  }

  onAuthStateChanged(auth, (user) => {
    const authButtons = document.getElementById("authButtons");
    if (user) {
      isAdmin = user.email === ADMIN_EMAIL;
      authButtons.innerHTML = `
                ${isAdmin ? '<a href="admin.html" class="nav-btn admin-btn">Админ</a>' : ''}
                <button class="nav-btn logout-btn" id="logoutBtn">Выйти</button>
            `;
      document.getElementById("logoutBtn")?.addEventListener("click", async () => {
        await signOut(auth);
        window.location.reload();
      });
    } else {
      authButtons.innerHTML = `<a href="login.html" class="nav-btn">Войти</a>`;
    }
  });

  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  if (!code) { window.location.href = "index.html"; }

  const snap = await getDocs(query(collection(db, "secret_pages"), where("code", "==", code)));
  if (snap.empty) { window.location.href = "index.html"; }

  const secretDoc = snap.docs[0];
  secretDocId = secretDoc.id;
  const secret = secretDoc.data();
  document.title = secret.title || "???";

  const pagesSnap = await getDocs(query(collection(db, "pages"), where("secretId", "==", secretDocId)));
  const pagesList = document.getElementById("pagesList");
  document.getElementById("pageContent").addEventListener("click", (e) => {
    if (e.target.classList.contains("spoiler")) {
      e.target.classList.toggle("hidden");
    }
  });

  if (pagesSnap.empty) {
    pagesList.innerHTML = `<p class="loading-text">Страниц пока нет</p>`;
    document.getElementById("pageContent").innerHTML = `
    <div class="secret-landing">
        <h1 class="secret-landing-title">${secret.title || "???"}</h1>
        ${secret.cover ? `<img src="${secret.cover}" class="secret-landing-cover">` : ""}
    </div>
`;
  } else {
    const pages = [];
    pagesSnap.forEach(d => pages.push({ id: d.id, ...d.data() }));
    pages.sort((a, b) => a.createdAt?.seconds - b.createdAt?.seconds);

    const sectionsSnap = await getDocs(query(collection(db, "sections"), where("secretId", "==", secretDocId)));
    const sections = [];
    sectionsSnap.forEach(d => sections.push({ id: d.id, ...d.data() }));
    sections.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

    await renderSidebar(pagesList, pages, sections, null, null, null, secretDocId);

    if (isAdmin) {
      const addRootSection = document.createElement("button");
      addRootSection.className = "page-nav-btn add-section-btn";
      addRootSection.textContent = "+ Добавить раздел";
      addRootSection.addEventListener("click", () => showAddSectionForm(pagesList, null, null, null, pages, sections, secretDocId));
      pagesList.appendChild(addRootSection);
    }

    document.getElementById("pageContent").innerHTML = `
        <div class="secret-landing">
            <h1 class="secret-landing-title">${secret.title || "???"}</h1>
            ${secret.cover ? `<img src="${secret.cover}" class="secret-landing-cover">` : ""}
        </div>
    `;
  }

  async function renderSidebar(container, pages, sections, parentId, workId, characterId, secretId) {
    // Показываем страницы без раздела (только на корневом уровне)
    if (parentId === null) {
      const rootPages = pages.filter(p => !p.sectionId);
      rootPages.forEach(page => {
        const btn = createPageBtn(page);
        container.appendChild(btn);
      });
    }

    // Показываем разделы этого уровня
    const levelSections = sections.filter(s => (s.parentId || null) === parentId);
    for (const section of levelSections) {
      const sectionEl = document.createElement("div");
      sectionEl.className = "sidebar-section";
      sectionEl.dataset.id = section.id;

      const sectionHeader = document.createElement("div");
      sectionHeader.className = "sidebar-section-header";
      sectionHeader.innerHTML = `
            <button class="sidebar-section-toggle">▶</button>
            <span class="sidebar-section-title">${section.title}</span>
            ${isAdmin ? `
                <button class="sidebar-section-add-page" data-section="${section.id}" title="Добавить страницу">+стр</button>
                <button class="sidebar-section-add-sub" data-section="${section.id}" title="Добавить подраздел">+раздел</button>
                <button class="sidebar-section-delete" data-section="${section.id}" title="Удалить раздел">✕</button>
            ` : ""}
        `;
      sectionEl.appendChild(sectionHeader);

      const sectionContent = document.createElement("div");
      sectionContent.className = "sidebar-section-content";
      sectionContent.style.display = "none";

      // Страницы этого раздела
      const sectionPages = pages.filter(p => p.sectionId === section.id);
      sectionPages.forEach(page => {
        const btn = createPageBtn(page);
        sectionContent.appendChild(btn);
      });

      // Подразделы рекурсивно
      await renderSidebar(sectionContent, pages, sections, section.id, null, null, secretId);

      sectionEl.appendChild(sectionContent);
      container.appendChild(sectionEl);

      // Открыть/закрыть раздел
      sectionHeader.querySelector(".sidebar-section-toggle").addEventListener("click", () => {
        const isOpen = sectionContent.style.display !== "none";
        sectionContent.style.display = isOpen ? "none" : "block";
        sectionHeader.querySelector(".sidebar-section-toggle").textContent = isOpen ? "▶" : "▼";
      });

      if (isAdmin) {
        sectionHeader.querySelector(".sidebar-section-add-page").addEventListener("click", () => {
          sectionContent.style.display = "block";
          sectionHeader.querySelector(".sidebar-section-toggle").textContent = "▼";
          showAddPageForm(sectionContent, section.id, null, null, pages, sections, secretId);
        });
        sectionHeader.querySelector(".sidebar-section-add-sub").addEventListener("click", () => {
          sectionContent.style.display = "block";
          sectionHeader.querySelector(".sidebar-section-toggle").textContent = "▼";
          showAddSectionForm(sectionContent, section.id, null, null, pages, sections, secretId);
        });
        sectionHeader.querySelector(".sidebar-section-delete").addEventListener("click", async () => {
          if (!confirm("Удалить раздел?")) return;
          await deleteDoc(doc(db, "sections", section.id));
          sectionEl.remove();
        });
      }
    }
  }

  function createPageBtn(page) {
    const btn = document.createElement("button");
    btn.className = "page-nav-btn";
    btn.textContent = page.title;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".page-nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadPage(page);
    });
    return btn;
  }

  function showAddSectionForm(container, parentId, workId, characterId, pages, sections, secretId) {
    const existing = container.querySelector(".add-section-form");
    if (existing) { existing.remove(); return; }

    const form = document.createElement("div");
    form.className = "add-section-form";
    form.innerHTML = `
        <input type="text" class="auth-input" placeholder="Название раздела" style="margin:8px 0;font-size:13px;padding:6px 10px">
        <button class="auth-btn" style="font-size:13px;padding:6px 12px;width:100%">Создать</button>
    `;
    container.appendChild(form);

    const input = form.querySelector("input");
    input.focus();

    form.querySelector("button").addEventListener("click", async () => {
      const title = input.value.trim();
      if (!title) return;
      const sectionData = { title, parentId: parentId || null, createdAt: new Date() };
      if (workId) sectionData.workId = workId;
      if (characterId) sectionData.characterId = characterId;

      // ИСУПРАВЛЕНО: используем глобальный secretDocId, если локальный secretId пустой
      const currentSecretId = secretId || secretDocId;
      if (currentSecretId) sectionData.secretId = currentSecretId;

      const newDoc = await addDoc(collection(db, "sections"), sectionData);
      form.remove();
      window.location.reload();
    });
  }

  function showAddPageForm(container, sectionId, workId, characterId, pages, sections, sid) {
    const existing = container.querySelector(".add-page-form");
    if (existing) { existing.remove(); return; }

    // ИСПРАВЛЕНО: подстраховка на случай, если sid не передался из рекурсии
    const captured = sid || secretDocId;

    const form = document.createElement("div");
    form.className = "add-page-form";
    form.innerHTML = `
        <input type="text" class="auth-input" placeholder="Название страницы" style="margin:8px 0;font-size:13px;padding:6px 10px">
        <button class="auth-btn" style="font-size:13px;padding:6px 12px;width:100%">Создать</button>
    `;
    container.appendChild(form);

    const input = form.querySelector("input");
    input.focus();

    const btn = form.querySelector("button");
    btn.addEventListener("click", async () => {
      const title = input.value.trim();
      if (!title) return;
      const pageData = { title, content: "", sectionId: sectionId, createdAt: new Date() };
      if (workId) pageData.workId = workId;
      if (characterId) pageData.characterId = characterId;
      if (captured) pageData.secretId = captured;
      await addDoc(collection(db, "pages"), pageData);
      form.remove();
      window.location.reload();
    });
  }

  function showImgPopup(img, x, y) {
    closeImgPopup();
    const popup = document.createElement("div");
    popup.className = "img-popup";
    popup.id = "imgPopup";
    popup.style.left = Math.min(x, window.innerWidth - 240) + "px";
    popup.style.top = (y + 10) + "px";
    popup.innerHTML = `
            <div class="img-popup-title">Размер</div>
            <div class="img-popup-row">
                <button class="img-popup-btn ${img.classList.contains('img-small') ? 'active' : ''}" data-size="img-small">Маленькая</button>
                <button class="img-popup-btn ${img.classList.contains('img-medium') ? 'active' : ''}" data-size="img-medium">Средняя</button>
                <button class="img-popup-btn ${img.classList.contains('img-large') ? 'active' : ''}" data-size="img-large">Большая</button>
                <button class="img-popup-btn ${img.classList.contains('img-full') ? 'active' : ''}" data-size="img-full">Полная</button>
            </div>
            <div class="img-popup-title">Положение</div>
            <div class="img-popup-row">
                <button class="img-popup-btn ${img.classList.contains('img-left') ? 'active' : ''}" data-align="img-left">◀ Влево</button>
                <button class="img-popup-btn ${img.classList.contains('img-center') ? 'active' : ''}" data-align="img-center">▬ Центр</button>
                <button class="img-popup-btn ${img.classList.contains('img-right') ? 'active' : ''}" data-align="img-right">▶ Вправо</button>
            </div>
            <button class="img-popup-close">Закрыть</button>
        `;
    document.body.appendChild(popup);
    popup.querySelectorAll("[data-size]").forEach(btn => {
      btn.addEventListener("click", () => {
        img.classList.remove("img-small", "img-medium", "img-large", "img-full");
        img.classList.add(btn.dataset.size);
        popup.querySelectorAll("[data-size]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
    popup.querySelectorAll("[data-align]").forEach(btn => {
      btn.addEventListener("click", () => {
        img.classList.remove("img-left", "img-center", "img-right");
        img.classList.add(btn.dataset.align);
        popup.querySelectorAll("[data-align]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
    popup.querySelector(".img-popup-close").addEventListener("click", closeImgPopup);
  }

  function closeImgPopup() {
    const popup = document.getElementById("imgPopup");
    if (popup) popup.remove();
  }

  function showSecretModal() {
    if (document.getElementById("secretModal")) return;
    const modal = document.createElement("div");
    modal.className = "secret-modal";
    modal.id = "secretModal";
    modal.innerHTML = `
        <div class="secret-box">
            <h2>Введи код доступа</h2>
            <p>Если знаешь — вводи</p>
            <input type="text" class="secret-input" id="secretInput" placeholder="••••••••" autocomplete="off">
            <button class="auth-btn" id="secretSubmit">Войти</button>
            <p class="secret-error" id="secretErr"></p>
        </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
    document.getElementById("secretInput").focus();
    document.getElementById("secretInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("secretSubmit").click();
      if (e.key === "Escape") modal.remove();
    });
    document.getElementById("secretSubmit").addEventListener("click", async () => {
      const code = document.getElementById("secretInput").value.trim();
      if (!code) return;
      const snap = await getDocs(query(collection(db, "secret_pages"), where("code", "==", code)));
      if (snap.empty) {
        document.getElementById("secretErr").textContent = "Неверный код";
        return;
      }
      window.location.href = `secret.html?code=${code}`;
    });
  }

  function loadPage(page) {
    currentPageId = page.id;
    const content = document.getElementById("pageContent");
    content.innerHTML = `
        ${page.cover ? `<img src="${page.cover}" class="page-cover-img">` : ""}
        <div class="page-header-row">
            <h1 class="page-title">${page.title}</h1>
            ${isAdmin ? `<button class="edit-inline-btn" id="editInlineBtn">Редактировать</button>` : ""}
        </div>
        <div class="page-body" id="pageBody">${page.content}</div>
        ${isAdmin ? `
            <div class="edit-toolbar" id="editToolbar" style="display:none">
                <div id="inlineEditor"></div>
                <div class="edit-actions">
                    <button class="auth-btn" id="saveInlineBtn">Сохранить</button>
                    <button class="nav-btn logout-btn" id="cancelInlineBtn">Отмена</button>
                </div>
                <p class="auth-error" id="inlineError"></p>
            </div>
        ` : ""}
    `;

    if (!isAdmin) return;

    document.getElementById("editInlineBtn").addEventListener("click", () => {
      document.getElementById("pageBody").style.display = "none";
      document.getElementById("editToolbar").style.display = "block";
      document.getElementById("editInlineBtn").style.display = "none";

      const editorEl = document.getElementById("inlineEditor");
      const newEditorEl = document.createElement("div");
      newEditorEl.id = "inlineEditor";
      editorEl.parentNode.replaceChild(newEditorEl, editorEl);

      // Регистрируем glitch embed
      const Inline = Quill.import("blots/inline");
      class GlitchBlot extends Inline {
        static create(value) {
          const node = super.create();
          node.setAttribute("data-text", value);
          node.className = "glitch";
          node.textContent = value;
          return node;
        }
        static formats(node) {
          return node.getAttribute("data-text");
        }
      }
      GlitchBlot.blotName = "glitch-embed";
      GlitchBlot.tagName = "span";
      Quill.register(GlitchBlot);

      class SpoilerBlot extends Inline {
        static create() {
          const node = super.create();
          node.className = "spoiler hidden";
          node.addEventListener("click", () => {
            node.classList.toggle("hidden");
          });
          return node;
        }
        static formats() { return true; }
      }
      SpoilerBlot.blotName = "spoiler";
      SpoilerBlot.tagName = "span";
      Quill.register(SpoilerBlot);


      currentQuill = new Quill("#inlineEditor", {
        theme: "snow",
        modules: {
          toolbar: {
            container: [
              [{ header: [1, 2, 3, false] }],
              ["bold", "italic", "underline", "strike"],
              [{ color: [] }, { background: [] }],
              [{ align: [] }],
              ["blockquote"],
              ["image", "link"],
              ["glitch"],
              ["spoiler"],
              ["clean"]
            ],
            handlers: {
              glitch: function() {
                const range = this.quill.getSelection();
                if (!range || range.length === 0) return;
                const text = this.quill.getText(range.index, range.length);
                this.quill.deleteText(range.index, range.length);
                this.quill.insertEmbed(range.index, "glitch-embed", text);
              },
              spoiler: function() {
                const range = this.quill.getSelection();
                if (!range || range.length === 0) return;
                this.quill.format("spoiler", true);
              }
            }
          }
        }
      });

      // Очищаем контент от тултипов и nbsp перед загрузкой в редактор
      const tempDiv = document.createElement("div");
      tempDiv.innerHTML = page.content || "";
      tempDiv.querySelectorAll("a.term-link").forEach(a => {
        const span = document.createElement("span");
        span.innerHTML = a.innerHTML;
        a.parentNode.replaceChild(span, a);
      });
      // Возвращаем nbsp обратно в табуляцию для редактора
      currentQuill.root.innerHTML = tempDiv.innerHTML.replace(/&nbsp;&nbsp;&nbsp;/g, '\t');

      currentQuill.root.addEventListener("click", (e) => {
        if (e.target.tagName === "IMG") showImgPopup(e.target, e.clientX, e.clientY);
      });

      currentQuill.getModule("toolbar").addHandler("image", () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.click();
        input.onchange = async () => {
          const file = input.files[0];
          if (!file) return;
          const url = await uploadFile(file);
          const range = currentQuill.getSelection() || { index: 0 };
          currentQuill.insertEmbed(range.index, "image", url);
          setTimeout(() => {
            const imgs = currentQuill.root.querySelectorAll("img");
            const img = imgs[imgs.length - 1];
            if (img) {
              img.classList.add("img-medium", "img-center");
              showImgPopup(img, 400, 300);
            }
          }, 100);
        };
      });
    });

    document.getElementById("cancelInlineBtn").addEventListener("click", () => {
      document.getElementById("pageBody").style.display = "block";
      document.getElementById("editToolbar").style.display = "none";
      document.getElementById("editInlineBtn").style.display = "inline-block";
      closeImgPopup();
      currentQuill = null;
    });

    document.getElementById("saveInlineBtn").addEventListener("click", async () => {
      const errorEl = document.getElementById("inlineError");
      try {
        closeImgPopup();
        errorEl.style.color = "var(--text-muted)";
        errorEl.textContent = "Сохраняем...";
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = currentQuill.root.innerHTML;
        tempDiv.querySelectorAll("a.term-link").forEach(a => {
          const span = document.createElement("span");
          span.innerHTML = a.innerHTML;
          a.parentNode.replaceChild(span, a);
        });
        const newContent = tempDiv.innerHTML.replace(/\t/g, '&nbsp;&nbsp;&nbsp;');
        await updateDoc(doc(db, "pages", currentPageId), { content: newContent });
        page.content = newContent;
        document.getElementById("pageBody").innerHTML = newContent;

        document.getElementById("pageBody").style.display = "block";
        document.getElementById("editToolbar").style.display = "none";
        document.getElementById("editInlineBtn").style.display = "inline-block";
        currentQuill = null;
        currentQuill = null;
        errorEl.textContent = "";
        // Перезагружаем страницу сохраняя URL
        setTimeout(() => window.location.reload(), 500);
      } catch (e) {
        errorEl.style.color = "var(--error)";
        errorEl.textContent = e.message;
      }
    });
  }
</script>
</body>
</html>
